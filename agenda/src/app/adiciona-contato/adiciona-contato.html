<form [formGroup]="formContato">
    <div>
        <label for="nome">Nome</label>
        <input type="text" name="nome" id="nome" 
        formControlName="nome">

        <label for="email">Email</label>
        <input type="email" name="email" id="email" 
           formControlName="email">

        <label for="telefone">Telefone</label>
        <input type="number" name="telefone" id="telefone" 
           formControlName="telefone">

        <label for="aniversario">Data de Aniversário</label>
        <input type="date" name="aniversario" id="aniversario"
           formControlName="aniversario">

        <label for="tipo">Tipo</label>
        <select id="tipo" formControlName="tipo">
            <option [value]="TipoContato.AMIGO">Amigo(a)</option>
            <option [value]="TipoContato.FAMILIA">Família</option>
            <option [value]="TipoContato.TRABALHO">Trabalho</option>
            <option [value]="TipoContato.OUTROS">Outros</option>
        </select>
    </div>
    <div>
        <input type="button" value="Adicionar" 
               (click)="adicionar()">
    </div>
</form>
